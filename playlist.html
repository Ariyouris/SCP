<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlists - Stream4Stream</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
}

body{
background:#0a0f1d;
color:white;
}

.header{
padding:20px;
border-bottom:1px solid #1b2235;
}

.header h1{
font-size:24px;
}

.container{
padding:20px;
}

.playlist-card{
background:#10182b;
border:1px solid #1b2235;
border-radius:14px;
padding:18px;
margin-bottom:15px;
}

.playlist-title{
font-size:18px;
font-weight:700;
margin-bottom:8px;
}

.playlist-info{
color:#9ca3af;
font-size:14px;
margin-bottom:12px;
}

.progress{
height:8px;
background:#1b2235;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#1ed760;
width:96%;
}

.back-btn{
display:inline-block;
margin-top:20px;
padding:12px 18px;
background:#1ed760;
color:black;
text-decoration:none;
border-radius:10px;
font-weight:600;
}
</style>

</head>
<body>

<div class="header">
<h1>🎵 All Playlists</h1>
</div>

<div class="container">

<div class="playlist-card">
<div class="playlist-title">
Road To 1M Streams
</div>

<div class="playlist-info">
50 Songs • 50 Members • 96% Completed
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>
</div>

<div class="playlist-card">
<div class="playlist-title">
Summer Push
</div>

<div class="playlist-info">
50 Songs • 47 Members • 89% Completed
</div>

<div class="progress">
<div class="progress-bar" style="width:89%"></div>
</div>
</div>

<div class="playlist-card">
<div class="playlist-title">
Comeback Week
</div>

<div class="playlist-info">
50 Songs • 50 Members • 100% Completed
</div>

<div class="progress">
<div class="progress-bar" style="width:100%"></div>
</div>
</div>

<a href="index.html" class="back-btn">
← Dashboard
</a>

</div>

</body>
</html>
